name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build the library first so the demo's typecheck can resolve
      # `@monzim/calendar` (its types + styles.css live in dist).
      - name: Build library
        run: pnpm --filter @monzim/calendar build

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm test

      - name: Lint package exports
        run: pnpm --filter @monzim/calendar lint:pkg

      - name: Build demo
        run: pnpm --filter web build
